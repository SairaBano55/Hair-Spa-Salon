<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hair Color Salon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('https://img.magnific.com/free-photo/woman-washing-head-hairsalon_1157-27179.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header-div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-box img {
            height: 50px;
            width: auto;
            display: block;
        }

        .status-btn {
            background-color: #d4af37;
            color: #000000;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: default;
            pointer-events: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            background-color: rgba(0, 0, 0, 0.65); 
        }

        .center-layout {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        .main-heading {
            font-size: 54px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .sub-heading {
            font-size: 20px;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .appointment-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 45px;
        }

        .services-table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: left;
        }

        .services-table th, .services-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .services-table th {
            background-color: rgba(0, 0, 0, 0.65);
            color: #d4af37;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .services-table td {
            font-size: 16px;
            color: #ffffff;
        }

        .price-col {
            text-align: right;
            color: #d4af37;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-div">
        <div class="logo-box">
            <img src="https://qaisarbalochsalon.com/wp-content/uploads/2025/07/Add-a-heading-1-150x100.png" alt="Salon Logo">
        </div>
        <div>
            <button class="status-btn" disabled>Website Under Construction</button>
        </div>
    </div>

    <div class="main-content">
        <div class="center-layout">
            <div class="main-heading">Hair Color Salon</div>
            <div class="sub-heading">In Karachi</div>
            
            <div>
                <button class="appointment-btn">Book An Appointment</button>
            </div>

            <table class="services-table">
                <thead>
                    <tr>
                        <th>Our Premium Services</th>
                        <th style="text-align: right;">Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Premium Hair Color Block</td>
                        <td class="price-col">Rs. 8,500</td>
                    </tr>
                    <tr>
                        <td>Keratin Treatment Smoothening</td>
                        <td class="price-col">Rs. 12,000</td>
                    </tr>
                    <tr>
                        <td>Luxury Hair Cutting & Styling</td>
                        <td class="price-col">Rs. 3,500</td>
                    </tr>
                    <tr>
                        <td>Protein Repair Treatment</td>
                        <td class="price-col">Rs. 6,000</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</body>
</html>
